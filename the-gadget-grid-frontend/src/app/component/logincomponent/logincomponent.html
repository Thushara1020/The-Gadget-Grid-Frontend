<div class="min-h-screen flex items-center justify-center bg-slate-950 p-6">
  <div class="relative p-px rounded-2xl overflow-hidden max-w-md w-full shadow-[0_0_50px_rgba(59,130,246,0.15)]">
    <div class="absolute inset-0 bg-linear-to-r from-blue-600 via-purple-500 to-cyan-500 animate-gradient-x"></div>

    <div class="relative bg-slate-900 p-8 md:p-10 rounded-[15px]">
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl shadow-lg shadow-blue-900/50 mb-4 rotate-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
        <h2 class="text-3xl font-black text-white tracking-tight italic uppercase">
          Welcome <span class="text-blue-500">Back</span>
        </h2>
        <p class="text-slate-400 text-sm mt-2">Enter your credentials to access shop</p>
      </div>

      <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)" class="space-y-6">
        <div>
          <label class="block text-xs font-bold text-blue-400 uppercase mb-2 ml-1 tracking-widest">Username</label>
          <input type="text" [(ngModel)]="loginData.username" name="username" placeholder="Enter your username" 
            class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition duration-300">
        </div>

        <div>
          <div class="flex justify-between mb-2 ml-1">
            <label class="text-xs font-bold text-blue-400 uppercase tracking-widest">Password</label>
            <a href="#" class="text-xs font-bold text-slate-500 hover:text-blue-400 transition-colors">Forgot?</a>
          </div>
          <input type="password" [(ngModel)]="loginData.password" name="password" placeholder="••••••••" 
            class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition duration-300">
        </div>

        <button type="submit" class="group relative w-full p-[1.5px] rounded-xl overflow-hidden mt-2 transition-transform active:scale-95 shadow-lg shadow-blue-900/20">
          <div class="absolute inset-0 bg-linear-to-r from-blue-600 via-purple-500 to-cyan-500 group-hover:animate-pulse"></div>
          <div class="relative bg-slate-950 py-3.5 rounded-[11px] flex justify-center items-center group-hover:bg-transparent transition duration-300">
            <span class="text-white font-black text-sm uppercase tracking-widest">Sign In</span>
          </div>
        </button>
      </form>

      <p class="text-center text-slate-500 text-sm mt-8">
        Don't have an account? 
        <a routerLink="/create-account" class="text-blue-400 hover:text-white transition font-bold uppercase ml-1 cursor-pointer underline-offset-4 hover:underline">
          Register
        </a>
      </p>
    </div>
  </div>
</div>
