<div class="min-h-screen flex items-center justify-center bg-slate-950 p-6">
  <div class="relative p-px rounded-2xl overflow-hidden max-w-md w-full shadow-[0_0_50px_rgba(59,130,246,0.15)]">
    <div class="absolute inset-0 bg-linear-to-r from-blue-600 via-purple-500 to-cyan-500 animate-gradient-x"></div>

    <div class="relative bg-slate-900 p-8 md:p-10 rounded-[15px]">
      <div class="text-center mb-10">
        <h2 class="text-3xl font-black text-white tracking-tight uppercase">Create <span class="text-purple-500">Account</span></h2>
        <p class="text-slate-400 text-sm mt-2">Join our gadget community today</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block text-xs font-bold text-blue-400 uppercase mb-2 ml-1 tracking-widest">Full Name</label>
          <input type="text" placeholder="John Doe" 
            class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition duration-300">
        </div>

        <div>
          <label class="block text-xs font-bold text-blue-400 uppercase mb-2 ml-1 tracking-widest">Email Address</label>
          <input type="email" placeholder="name@example.com" 
            class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition duration-300">
        </div>

        <div>
          <label class="block text-xs font-bold text-blue-400 uppercase mb-2 ml-1 tracking-widest">Password</label>
          <input type="password" placeholder="••••••••" 
            class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition duration-300">
        </div>

        <button type="submit" class="group relative w-full p-[1.5px] rounded-xl overflow-hidden mt-4 transition-transform active:scale-95">
          <div class="absolute inset-0 bg-linear-to-r from-blue-600 via-purple-500 to-cyan-500 group-hover:animate-pulse"></div>
          <div class="relative bg-slate-950 py-3.5 rounded-[11px] flex justify-center items-center group-hover:bg-transparent transition duration-300">
            <span class="text-white font-black text-sm uppercase tracking-widest">Sign Up Now</span>
          </div>
        </button>
      </form>

      <p class="text-center text-slate-500 text-sm mt-8">
        Already have an account? 
        <a routerLink="/login" class="text-blue-400 hover:text-white transition font-bold uppercase ml-1 cursor-pointer underline-offset-4 hover:underline">
          Login
        </a>
      </p>
    </div>
  </div>
</div>
