<div class="min-h-screen flex items-center justify-center bg-slate-950 p-6 font-sans">
  <div class="relative p-px rounded-2xl overflow-hidden max-w-md w-full shadow-[0_0_50px_rgba(59,130,246,0.1)]">
    <div class="absolute inset-0 bg-linear-to-r from-blue-600 via-purple-500 to-cyan-400 animate-gradient-x"></div>

    <div class="relative bg-slate-900/95 backdrop-blur-xl p-8 md:p-10 rounded-[15px]">
      <div class="text-center mb-10">
        <h2 class="text-3xl font-black text-white tracking-tighter uppercase italic">
          Create <span class="text-transparent bg-clip-text bg-linear-to-r from-blue-400 to-purple-500">Account</span>
        </h2>
        <p class="text-slate-400 text-xs font-medium mt-2 tracking-widest uppercase opacity-70">Join our gadget community</p>
      </div>

      <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <div class="space-y-1">
          <label class="block text-[10px] font-black text-blue-400 uppercase ml-1 tracking-[0.2em]">Full Name</label>
          <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500 group-focus-within:text-blue-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </span>
            <input type="text" formControlName="fullName" placeholder="John Doe" 
              class="w-full bg-slate-950/50 border border-slate-800 text-white rounded-xl pl-11 pr-4 py-3.5 focus:outline-none focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/20 transition-all duration-300 placeholder:text-slate-700">
          </div>
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-black text-purple-400 uppercase ml-1 tracking-[0.2em]">Email</label>
          <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500 group-focus-within:text-purple-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" /></svg>
            </span>
            <input type="text" formControlName="username" placeholder="johndoe" 
              class="w-full bg-slate-950/50 border border-slate-800 text-white rounded-xl pl-11 pr-4 py-3.5 focus:outline-none focus:border-purple-500/50 focus:ring-2 focus:ring-purple-500/20 transition-all duration-300 placeholder:text-slate-700">
          </div>
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-black text-cyan-400 uppercase ml-1 tracking-[0.2em]">Contact Number</label>
          <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500 group-focus-within:text-cyan-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
            </span>
            <input type="text" formControlName="contactNumber" placeholder="0712345678" 
              class="w-full bg-slate-950/50 border border-slate-800 text-white rounded-xl pl-11 pr-4 py-3.5 focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all duration-300 placeholder:text-slate-700">
          </div>
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-black text-slate-400 uppercase ml-1 tracking-[0.2em]">Password</label>
          <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500 group-focus-within:text-white transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </span>
            <input type="password" formControlName="password" placeholder="••••••••" 
              class="w-full bg-slate-950/50 border border-slate-800 text-white rounded-xl pl-11 pr-4 py-3.5 focus:outline-none focus:border-white/30 focus:ring-2 focus:ring-white/10 transition-all duration-300 placeholder:text-slate-700">
          </div>
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-black text-amber-400 uppercase ml-1 tracking-[0.2em]">Select Role</label>
          <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500 group-focus-within:text-amber-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
            </span>
            <select formControlName="role" 
              class="w-full bg-slate-950/50 border border-slate-800 text-white rounded-xl pl-11 pr-4 py-3.5 focus:outline-none focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20 transition-all duration-300 appearance-none cursor-pointer">
              <option value="" disabled selected class="bg-slate-900">Choose your role</option>
              <option value="CUSTOMER" class="bg-slate-900 text-white">Customer</option>
              <option value="WAITER" class="bg-slate-900 text-white">Waiter</option>
              <option value="MANAGER" class="bg-slate-900 text-white">Manager</option>
            </select>
          </div>
        </div>

        <button type="submit" [disabled]="signUpForm.invalid" 
          class="group relative w-full h-14 rounded-xl overflow-hidden mt-6 transition-all duration-300 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
          <div class="absolute inset-0 bg-linear-to-r from-blue-600 via-purple-600 to-cyan-500 group-hover:scale-110 transition-transform duration-500"></div>
          <div class="relative flex justify-center items-center">
            <span class="text-white font-black text-sm uppercase tracking-[0.25em] drop-shadow-md">Sign Up Now</span>
          </div>
        </button>
      </form>
    </div>
  </div>
</div>
